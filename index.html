<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM HACKED</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 50px; }
        #hack-btn { background: #000; border: 2px solid #0f0; color: #0f0; padding: 20px; font-size: 20px; cursor: pointer; }
        #hack-btn:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <h1>SYSTEM HACKED</h1>
    <div id="power">Мощность: 0</div>
    <br><br>
    <button id="hack-btn" onclick="hack()">[ВЗЛОМАТЬ]</button>

    <script>
        async function hack() {
            try {
                // Если сервер и фронтенд на одном домене, этот адрес сработает идеально
                const res = await fetch('/api/hack', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: 'user1' })
                });
                
                if (!res.ok) throw new Error('Ошибка сервера');
                
                const data = await res.json();
                document.getElementById('power').innerText = "Мощность: " + data.power;
            } catch (err) {
                console.error(err);
                alert("Ошибка при взломе!");
            }
        }
    </script>
</body>
</html>
